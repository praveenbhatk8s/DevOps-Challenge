apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: devops-challenge
  namespace: devops-challenge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: devops-challenge
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70      # scale up when avg CPU > 70%